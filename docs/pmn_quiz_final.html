  {t:"Pengalaman nyata orang lebih jujur dari statistik abstrak yang dingin.",s:0},
]},
{id:34,ax:"E",q:"Tradisi dan kearifan lokal sebagai panduan tindakan:",opts:[
  {t:"Perlu diuji secara empiris seperti klaim lainnya — umur suatu praktik bukan bukti validitasnya.",s:3},
  {t:"Berguna dalam beberapa konteks, tapi perlu dikritisi secara analitis.",s:2},
  {t:"Berharga dan perlu dilestarikan, meski perlu adaptasi dengan kondisi zaman.",s:1},
  {t:"Mengandung kebijaksanaan kumulatif yang tidak bisa sepenuhnya digantikan logika modern.",s:0},
]},
{id:35,ax:"E",q:"Klaim alternatif (homeopati, astrologi, kristal penyembuhan, dll.):",opts:[
  {t:"Tidak memiliki mekanisme yang terbukti; kepercayaannya bergantung pada pembungkaman berpikir kritis.",s:3},
  {t:"Tidak berdasar secara ilmiah dan berbahaya jika menggantikan pengobatan medis.",s:2},
  {t:"Tidak ada bukti ilmiah yang kuat, tapi kalau membantu seseorang secara psikologis, tak apa.",s:1},
  {t:"Mungkin ada kebenarannya yang belum dipahami sains konvensional.",s:0},
]},
{id:36,ax:"E",q:"Tentang \"objektivitas\" dalam media dan jurnalisme:",opts:[
  {t:"Klaim netralitas itu sendiri adalah posisi ideologis; transparansi posisi lebih jujur dari pura-pura tidak ada.",s:3},
  {t:"Sulit dicapai sepenuhnya, tapi bisa didekati dengan transparansi metodologi.",s:2},
  {t:"Ideal yang perlu diperjuangkan dengan memberi ruang pada berbagai sudut pandang.",s:1},
  {t:"Bisa dicapai dengan menjunjung standar moral dan kode etik yang kuat.",s:0},
]},
{id:43,ax:"E",q:"Teman Anda membuat keputusan hidup besar berdasarkan ramalan zodiak. Reaksi Anda:",opts:[
  {t:"Ingin tahu mekanisme apa yang membuat seseorang mempercayai sistem prediksi tanpa dasar kausal yang terverifikasi.",s:3},
  {t:"Ingin menunjukkan bahwa ada cara yang lebih andal untuk membuat keputusan penting.",s:2},
  {t:"Sedikit khawatir, tapi menghormati itu pilihan pribadi yang tidak merugikan orang lain.",s:1},
  {t:"Tak apa — masing-masing punya caranya sendiri mencari makna dan panduan.",s:0},
]},
{id:44,ax:"E",q:"Seseorang berargumen: \"Data tidak bisa menangkap kebenaran sejati. Pengalaman hidup saya lebih valid dari statistik mana pun.\" Respons Anda:",opts:[
  {t:"Ini adalah category error: pengalaman personal sangat terbatas untuk klaim sosial yang luas — bukan tidak valid, tapi tidak representatif.",s:3},
  {t:"Pengalaman valid sebagai data poin, tapi perlu dikonfirmasi dengan konteks yang lebih luas untuk menjadi klaim sosial.",s:2},
  {t:"Ada benarnya — data sering melewatkan nuansa yang hanya bisa ditangkap lewat pengalaman langsung.",s:1},
  {t:"Setuju sepenuhnya — pengalaman personal adalah kebenaran yang paling otentik.",s:0},
]},
];

const PROFILES={
HHHH:{n:"Si Peta Tanpa Kompas",tag:"Analisis paling tajam — tapi apakah berujung pada tindakan?",c:"#1e5055",
jati:"Anda adalah orang yang paling akurat di ruangan mana pun: menelusuri penyebab ke kondisi material, menolak solusi palsu, tidak tergoda narasi yang terlalu rapi. Masalah bukan pada pemahaman Anda — masalah adalah apa yang terjadi setelah pemahaman itu.",
ironi:{t:"Anda Adalah Pemikir Paling Tidak Berbahaya",b:"Sistem tidak pernah takut pada orang yang memahami cara kerjanya. Mereka takut pada yang bertindak. Kemampuan Anda mendekonstruksi klaim yang berlebihan bisa jadi senjata — atau bisa jadi alasan sempurna untuk tidak pernah menyepakati tindakan apa pun. Gerakan sosial yang berhasil tidak dipimpin oleh yang paling analitis. Mereka dipimpin oleh yang mampu mengubah analisis menjadi koalisi, koalisi menjadi tekanan. Presisi analitis yang tidak berujung pada gerakan adalah koleksi pribadi yang indah."},
hukum:{t:"Hukum Paralisis Presisi",b:"Setiap gerakan sosial yang berhasil menyederhanakan. Mereka harus — mobilisasi membutuhkan narasi, narasi membutuhkan reduksi. Semakin akurat peta Anda, semakin banyak rute yang tampak terlalu kotor untuk diambil. Pertanyaannya bukan apakah gerakan itu sempurna secara analitis. Pertanyaannya: apakah Anda berdiri di tepi mengkritisi simplifikasi mereka, atau masuk membawa ketajaman Anda ke dalam perjuangan yang tidak sempurna itu?"},
interogasi:["Berapa banyak gerakan yang Anda tolak bergabung karena framing mereka \"tidak tepat\" — padahal agenda materialnya sesuai dengan yang Anda perjuangkan?","Apakah analisis Anda dalam 12 bulan terakhir menghasilkan lebih banyak tindakan — atau lebih banyak alasan untuk menunda?","Jika seseorang dengan analisis lebih kasar tapi lebih mampu bertindak bisa melakukan 70% dari apa yang Anda bisa — apakah Anda memilih mereka untuk memimpin?"],
uji:{t:"Manifesto atau Massa?",s:"Sebuah gerakan buruh besar mengundang Anda menulis manifesto nasional mereka. Draf awal memiliki klaim empiris yang lemah dan framing yang tidak konsisten secara teoritis — tapi sangat resonan dengan massa. Jika Anda perbaiki sepenuhnya, Anda kehilangan kekuatan mobilisasi. Jika dibiarkan, Anda meminjamkan nama pada argumen yang Anda tahu lebih baik. Anda punya dua hari.",a:"Tulis ulang dengan presisi penuh — dan berisiko kehilangan resonansi massa sehingga gerakan gagal membangun koalisi.",b:"Pertahankan kekasaran yang efektif — dan pasang nama Anda pada argumen yang secara analitis di bawah kemampuan Anda."},pmn:"PMN adalah Anda — atau lebih tepatnya, Anda adalah PMN minus satu komitmen: bahwa analisis yang benar menuntut implikasi tindakan yang konkret. PMN bukan sekadar deskripsi cara dunia bekerja, tapi kerangka yang menuntut konsekuensi normatif dan strategi dari deskripsi itu. Tanpa langkah itu, analisis Anda adalah arsip yang sangat akurat tentang sebuah mesin yang terus berjalan."},

HHHL:{n:"Si Revolusioner yang Masih Berdoa",tag:"Analisis yang tepat, fondasi yang tidak bisa diverifikasi",c:"#2563a8",
jati:"Anda menggabungkan ketajaman struktural dengan keyakinan mendalam pada dimensi non-material — spiritual, etis, atau transenden. Anda melihat eksploitasi dengan jernih, tapi menemukan energi atau legitimasi perjuangan dari sumber yang tidak bisa diuji secara empiris.",
ironi:{t:"Kamuflase Terbaik bagi Kapital",b:"Kritik terhadap kapitalisme yang dikemas dalam bahasa spiritual lebih mudah diterima — dan lebih mudah dicooptasi. Paus mengkritik kapitalisme. Dalai Lama mengkritik kapitalisme. Tidak satu pun dari mereka membuat pemilik modal tidak tidur. Yang membuat mereka tidak tidur bukan kutipan moral yang indah — tapi tuntutan redistribusi yang spesifik, terorganisir, dan tidak bisa diredam dengan pujian dan penghargaan moral."},
hukum:{t:"Hukum Penyerapan Spiritual",b:"Gerakan yang paling efektif mengubah struktur merumuskan tuntutan dalam bahasa hak dan kepentingan material. Bukan karena moral tidak penting, tapi karena \"ini tidak adil\" jauh lebih mudah dinetralkan daripada \"kami menginginkan 40% kepemilikan dari surplus yang kami produksi.\""},
interogasi:["Apakah bahasa spiritual Anda memperkuat daya tahan gerakan — atau membuat tuntutan lebih mudah diredam dengan sanjungan moral?","Pernahkah keyakinan akan \"kehendak Tuhan\" membuat Anda lebih pasif di momen di mana analisis material jelas menunjukkan intervensi yang diperlukan?","Jika fondasi spiritual Anda ternyata keliru — apakah perjuangan Anda punya fondasi material yang cukup untuk berdiri sendiri?"],
uji:{t:"Doa atau Strategi?",s:"Komunitas adat yang Anda dampingi akan digusur oleh perusahaan tambang yang sudah menang di pengadilan. Sumber daya Anda hanya cukup untuk satu pilihan.",a:"Kampanye internasional berbasis bahasa spiritual tentang \"hubungan sakral dengan tanah\" — resonan dan mobilisatif, tapi tidak punya kekuatan hukum langsung.",b:"Gugatan hukum berbasis klaim kepemilikan material yang terdokumentasi — kering, kurang resonan secara moral, tapi punya preseden kuat di pengadilan."},pmn:"PMN menghargai ketajaman struktural Anda tapi menantang satu hal: konsistensi metodologis. Jika Anda bersedia menguji klaim tentang kapitalisme secara empiris, mengapa tidak klaim tentang dimensi spiritual? PMN tidak anti-spiritualitas — tapi menuntut bahwa klaim tentang realitas, termasuk yang transenden, harus konsisten dengan standar epistemik yang Anda terapkan di tempat lain. Dua standar berbeda untuk dua domain berbeda adalah sebuah pilihan — pilihan yang perlu diakui, bukan disembunyikan."},

HHLH:{n:"Si Pembedah yang Tidak Berpihak",tag:"Mengerti sistem lebih dari siapa pun — tapi tidak melihat alasan mengubahnya",c:"#7c3aed",
jati:"Anda berpikir secara material dan empiris dengan pemahaman struktural yang baik. Anda tahu bagaimana mesin ketimpangan bekerja — lebih baik dari kebanyakan orang progresif yang memperjuangkan perubahannya. Hanya saja, Anda tidak merasa ada urgensi untuk menghentikannya.",
ironi:{t:"Penyedia Amunisi untuk Kedua Pihak",b:"Analisis Anda tentang bagaimana sistem bekerja sangat berharga — dan secara konsisten digunakan oleh kedua pihak. Yang membela status quo menggunakannya untuk membuktikan bahwa sistem ini \"alami\" dan \"stabil.\" Yang ingin mengubahnya menggunakannya sebagai peta. Tapi netralitas dalam sistem yang asimetris selalu menguntungkan pihak yang sudah punya lebih. Posisi \"tidak berpihak\" Anda adalah posisi — Anda hanya tidak mengakuinya."},
hukum:{t:"Hukum Deskripsi sebagai Legitimasi",b:"Setiap kali seseorang mendeskripsikan mekanisme ketimpangan tanpa menambahkan evaluasi normatif, mereka secara implisit menormalisasinya. \"Beginilah cara kapitalisme bekerja\" dan \"beginilah cara kapitalisme bekerja dan ini yang harus kita lakukan\" adalah dua pernyataan yang berbeda secara fundamental."},
interogasi:["Siapa yang lebih sering mengutip analisis Anda — mereka yang ingin mengubah sistem atau mereka yang ingin mempertahankannya?","Apakah \"tidak berpihak\" Anda adalah posisi epistemik yang konsisten, atau cara menghindari konsekuensi dari kesimpulan analitis Anda sendiri?","Jika seseorang yang Anda sayangi mengalami kerugian langsung dari mekanisme yang Anda deskripsikan — apakah Anda masih bisa netral?"],
uji:{t:"Laporan untuk Siapa?",s:"Anda diminta menulis laporan tentang dampak kebijakan upah minimum oleh dua klien berbeda secara bersamaan: satu serikat buruh, satu asosiasi pengusaha. Data yang sama. Analisis yang sama. Anda tahu laporan itu akan diinterpretasikan berbeda sesuai kepentingan masing-masing.",a:"Tulis satu laporan identik untuk keduanya — dan abaikan bahwa Anda sedang aktif berkontribusi pada dua sisi pertempuran yang sama.",b:"Tolak salah satu klien — dengan risiko dianggap tidak profesional dan kehilangan reputasi netralitas yang selama ini menjadi modal Anda."},pmn:"PMN setuju dengan hampir seluruh analisis Anda tentang cara sistem bekerja. Yang berbeda: PMN berargumen bahwa analisis yang benar tentang kondisi material secara inheren menghasilkan implikasi normatif. Deskripsi ketimpangan yang akurat tanpa evaluasi adalah pilihan normatif — pilihan untuk tidak memilih. Dan itu sendiri adalah posisi, yang secara konsisten menguntungkan pihak yang sudah punya lebih."},

HHLL:{n:"Si Insinyur Tatanan",tag:"Memahami struktur untuk mempertahankan, bukan mengubahnya",c:"#4b5563",
jati:"Anda memahami dengan sangat baik bagaimana institusi, kekuasaan, dan kondisi material membentuk perilaku. Anda bisa mendiagnosis masalah struktural dengan tepat. Tapi kesimpulan Anda sering berakhir pada \"sistem ini perlu dioptimalkan\" — bukan \"sistem ini perlu diganti.\"",
ironi:{t:"Konsultan Terbaik bagi Tatanan yang Ada",b:"Pemahaman Anda tentang struktur membuat Anda sangat berharga bagi mereka yang ingin memastikan mesin berjalan efisien dan tidak meledak. Setiap solusi Anda memperpanjang umur struktur yang ada, bukan menggantikannya. Insinyur yang sangat baik bisa saja bekerja keras seumur hidup untuk membuat pabrik yang memproduksi hal yang salah menjadi lebih efisien."},
hukum:{t:"Hukum Optimasi sebagai Konservasi",b:"Setiap gerakan optimasi sistem adalah secara inheren konservatif — ia memperpanjang umur struktur yang ada. Ketika masalah bukan pada efisiensi mesin tapi pada apa yang diproduksinya, mengoptimalkan mesin adalah cara paling canggih untuk menghindari pertanyaan yang sesungguhnya."},
interogasi:["Kapan terakhir kali analisis struktural Anda menghasilkan rekomendasi yang merugikan kelompok yang sudah berkuasa?","Apakah \"optimasi\" Anda memiliki kriteria keberhasilan yang bisa menghasilkan kesimpulan bahwa sistem ini tidak bisa dioptimalkan — harus diganti?","Jika klien Anda adalah sistem kekuasaan itu sendiri, siapa yang membayar gaji analis struktural yang bekerja untuk menantangnya?"],
uji:{t:"Efisien atau Berdaya?",s:"Anda diminta mendesain ulang sistem distribusi bantuan sosial agar lebih efisien. Cara paling efisien adalah menghilangkan lapisan perantara komunitas — tapi lapisan itulah satu-satunya ruang di mana komunitas punya kendali atas sumber daya mereka.",a:"Rekomendasikan efisiensi penuh — dan terima bahwa Anda baru saja mendesain sistem yang lebih baik dalam mendistribusikan bantuan sekaligus lebih baik dalam memelihara ketergantungan.",b:"Tolak definisi \"efisiensi\" klien Anda — dan risiko kontrak dibatalkan karena Anda tidak memberikan apa yang diminta."},pmn:"PMN dan Anda berbagi alat analitis yang sama tapi menggunakannya untuk tujuan yang berlawanan. PMN menantang satu pertanyaan: apakah premis normatif yang Anda gunakan untuk mengevaluasi hasil analisis Anda — bahwa tatanan yang ada perlu dipertahankan — bisa diuji secara empiris? Atau ia adalah asumsi awal yang tidak pernah dipersoalkan?"},

HLHH:{n:"Si Dokter Kebijakan",tag:"Data yang tepat — tapi melewatkan siapa yang memegang stetoskopnya",c:"#0c7fa8",
jati:"Anda materialist, empiris, dan progresif — tapi analisis Anda cenderung pada solusi kebijakan dan teknis daripada transformasi struktural kekuasaan. Anda percaya bahwa dengan data yang cukup dan desain kebijakan yang tepat, sebagian besar masalah sosial bisa diperbaiki dari dalam sistem yang ada.",
ironi:{t:"Tukang Cukur untuk Raksasa",b:"Masalah terbesar dengan pendekatan kebijakan yang tidak menyentuh kekuasaan: seseorang harus memiliki akses ke ruang desain kebijakan untuk mengimplementasikannya — dan ruang itu dikendalikan oleh kepentingan yang sama yang ingin Anda atasi. Setiap kebijakan redistributif yang \"terasa wajar\" sudah melewati filter dari mereka yang paling dirugikan oleh redistribusi."},
hukum:{t:"Hukum Stetoskop Milik Pasien",b:"Teknokrasi progresif berulang kali menghasilkan kebijakan yang \"secara teknis benar\" tapi gagal karena komunitas tidak punya kendali atas implementasi dan definisi keberhasilan. Solusi yang dirancang oleh ahli untuk komunitas — tanpa kekuasaan mendefinisikan masalah itu sendiri — selalu berisiko melayani kebutuhan laporan tahunan, bukan kebutuhan riil."},
interogasi:["Seberapa sering Anda merancang solusi berbasis bukti yang tidak menyentuh distribusi kekuasaan yang menyebabkan masalah itu ada?","Siapa yang mendanai penelitian yang Anda gunakan sebagai bukti — dan apa kepentingan mereka?","Apakah \"berbasis bukti\" Anda juga mencakup bukti bahwa intervensi teknis tanpa perubahan kekuasaan cenderung gagal dalam jangka panjang?"],
uji:{t:"Skala atau Otonomi?",s:"Program intervensi Anda terbukti sangat efektif. Pemerintah menawarkan pendanaan besar untuk skalanya ke seluruh negeri — dengan satu syarat: komunitas tidak bisa ikut menentukan protokol implementasi, demi menjaga standar nasional.",a:"Terima pendanaan — menjangkau jutaan orang tapi dengan komunitas yang kehilangan kendali atas proses yang menyentuh hidup mereka.",b:"Tolak — pertahankan otonomi komunitas tapi dengan jangkauan terbatas yang hanya menyentuh sebagian kecil dari yang membutuhkan."},pmn:"PMN menghargai niat baik Anda dan komitmen pada bukti. Tapi menantang satu asumsi fundamental: bahwa ruang kebijakan adalah netral dan terbuka bagi yang paling kompeten. PMN berargumen bahwa ruang itu sendiri adalah produk dari distribusi kekuasaan — dan bahwa solusi yang tidak menyentuh distribusi itu akan selalu difilter oleh kepentingan yang mengendalikannya. Data yang baik di tangan yang salah masih menghasilkan kebijakan yang melayani kepentingan yang salah."},

HLHL:{n:"Si Positivis di Atas Gajah",tag:"Data yang akurat tentang gejala — buta terhadap anatomi yang menghasilkannya",c:"#64748b",
jati:"Anda materialist dan empiris — percaya pada bukti, menolak klaim yang tidak terverifikasi. Tapi analisis Anda cenderung pada deskripsi fenomena daripada pertanyaan tentang siapa yang memiliki kekuasaan untuk membentuk fenomena tersebut.",
ironi:{t:"Dokter yang Mengukur Demam Tanpa Memeriksa Infeksi",b:"Anda bisa mendeskripsikan korelasi antara kemiskinan dan kriminalitas lebih akurat dari siapa pun. Tapi pertanyaan \"mengapa kemiskinan itu ada dan terus direproduksi\" membutuhkan pertanyaan tentang kekuasaan yang tidak bisa dijawab hanya dengan data deskriptif. Positivisme tanpa analisis kekuasaan menghasilkan deskripsi yang sangat presisi tentang akibat — tanpa menyentuh penyebab sistemiknya."},
hukum:{t:"Hukum Data sebagai Dekorasi",b:"Kombinasi positivisme dan klaim objektivitas — tanpa analisis tentang siapa yang memilih pertanyaan apa yang diteliti — menjadi salah satu alat legitimasi status quo paling efektif yang pernah ada. Justru karena ia terlihat tidak memihak."},
interogasi:["Pertanyaan apa yang tidak bisa Anda jawab dengan metodologi Anda saat ini — dan mengapa itu mungkin penting?","Apakah \"objektivitas\" Anda mencakup refleksi tentang siapa yang mendanai pertanyaan yang Anda jawab?","Jika data Anda menunjukkan bahwa satu-satunya solusi yang bekerja adalah yang mengancam kepentingan yang mendanai penelitian Anda — apa yang Anda lakukan?"],
uji:{t:"Angka yang Merepotkan",s:"Penelitian Anda menunjukkan secara meyakinkan bahwa kenaikan upah minimum 30% tidak akan menyebabkan pengangguran signifikan — bertentangan langsung dengan konsensus yang dipakai untuk menolak kebijakan tersebut. Asosiasi pengusaha yang mendanai sebagian penelitian Anda meminta Anda \"tidak mempublikasikan sampai ada tinjauan lebih lanjut.\"",a:"Publikasikan — dan hadapi kemungkinan kehilangan pendanaan dan akses ke data yang selama ini Anda gunakan.",b:"Tunda publikasi — dan terima bahwa kebijakan yang bisa membantu jutaan pekerja tertunda karena Anda memilih hubungan institusional di atas bukti yang Anda produksi sendiri."},pmn:"PMN menghargai disiplin epistemik Anda. Yang hilang: positivisme tanpa pertanyaan tentang siapa yang mendefinisikan 'masalah yang perlu dijelaskan' dan 'data yang relevan' adalah positivisme yang secara tidak disadari melayani status quo. PMN menambahkan satu langkah yang tidak ada dalam toolkit Anda: analisis tentang kondisi sosial dari produksi pengetahuan itu sendiri."},

HLLH:{n:"Si Egois yang Paling Jujur",tag:"Ego naturalism: kejujuran tentang kepentingan diri bisa lebih progresif dari altruisme palsu",c:"#0e7490",
jati:"Anda materialist dan empiris, percaya pada mekanisme pasar dan kalkulasi rasional kepentingan diri. Anda tidak berpura-pura bahwa motivasi Anda murni altruistis. Dan justru karena kejujuran itu, Anda adalah salah satu aktor yang paling bisa diprediksi dan diandalkan dalam analisis sosial.",
ironi:{t:"Paradoks Egois yang Lebih Berguna dari Dermawan",b:"PMN mengakui sesuatu yang tidak nyaman bagi banyak orang progresif: aktor yang secara jujur mengkalkulasi kepentingan diri jangka panjang sering menghasilkan kebijakan sosial yang lebih baik daripada dermawan yang motivasinya campuran antara empati, citra, dan penghindaran pajak. Versi terbaik Anda — egois yang tercerahkan, yang memahami bahwa stabilitas sosial adalah kepentingan jangka panjangnya — adalah sekutu yang lebih bisa diandalkan daripada filantropi yang bisa menguap ketika fotografernya pulang. Masalahnya: \"versi terbaik\" itu membutuhkan analisis struktural yang selama ini Anda anggap terlalu ideologis."},
hukum:{t:"Hukum Kepentingan Diri yang Konsisten",b:"Aktor yang beroperasi dari kepentingan diri yang jelas lebih mudah diprediksi, diajak bernegosiasi, dan didesain insentifnya daripada aktor yang motivasinya campuran. Yang berbahaya bukan egois yang jujur — yang berbahaya adalah egois yang menyamar sebagai dermawan, karena mereka tidak bisa dipertanggungjawabkan pada kepentingan yang sebenarnya mereka kejar."},
interogasi:["Apakah kepentingan diri Anda sudah termasuk perhitungan tentang apa yang terjadi pada stabilitas sosial jika ketimpangan terus memburuk selama 20 tahun ke depan?","Seberapa jauh \"kepentingan diri yang tercerahkan\" bisa membawa Anda sebelum Anda membutuhkan analisis struktural — yang selama ini Anda anggap ideologis — untuk melanjutkan kalkulasinya?","Jika bukti empiris menunjukkan bahwa redistribusi besar akan menguntungkan Anda dalam jangka panjang, apakah Anda mendukungnya — atau ada sesuatu yang lain yang menghalangi?"],
uji:{t:"Kalkulasi Jangka Panjang",s:"Perusahaan Anda beroperasi di kota dengan ketimpangan sangat tinggi. Konsultan menunjukkan data: dalam 20 tahun, kondisi ini akan menghasilkan ketidakstabilan yang secara langsung merugikan bisnis Anda. Solusi membutuhkan investasi dalam kesejahteraan karyawan yang memotong margin 15% dalam 5 tahun pertama. Kompetitor Anda tidak akan melakukannya.",a:"Bertindak sesuai kepentingan jangka panjang — dan ambil risiko kerugian kompetitif jangka pendek yang mungkin membuat Anda tersingkir sebelum investasi berbuah.",b:"Ikuti insentif jangka pendek — dan buktikan mengapa \"kepentingan diri yang tercerahkan\" sering gagal tanpa mekanisme koordinasi yang memaksa semua orang bergerak bersama."},pmn:"Ini profil yang PMN anggap paling menarik untuk diajak berdialog — bukan karena setuju, tapi karena fondasi epistemologisnya bisa konsisten. PMN berargumen: jika Anda benar-benar mengikuti kepentingan diri yang tercerahkan secara konsisten dan dengan cakrawala waktu yang cukup panjang, Anda akan sampai pada kesimpulan yang mengejutkan — bahwa redistribusi struktural adalah kalkulasi yang rasional, bukan ideologi. Egois yang jujur dan tercerahkan seharusnya menjadi pendukung perubahan struktural. Bukan karena moral. Karena berhitung."},

HLLL:{n:"Si Darwinisme Lunak",tag:"Melihat dunia apa adanya — dan tidak merasa ada yang salah dengan itu",c:"#78716c",
jati:"Anda materialist dalam pengertian yang paling mentah: dunia bekerja melalui kepentingan dan kekuasaan. Anda tidak terlalu tertarik pada perubahan progresif, analisis struktural kritis, atau metodologi empiris yang ketat. Anda tahu dunia tidak adil. Anda juga tidak terlalu khawatir tentang hal itu.",
ironi:{t:"Realisme yang Paling Rajin Melayani yang Berkuasa",b:"\"Dunia memang begitu\" adalah frasa yang selalu menguntungkan pihak yang paling diuntungkan oleh cara dunia itu bekerja. Realisme sebagai sikap politik bukan netral — ia secara konsisten melegitimasi status quo dengan cara yang paling elegan: dengan berpura-pura tidak memiliki agenda sama sekali. Setiap orang yang pernah menolak perubahan dengan alasan \"itulah sifat manusia\" sedang melakukan tindakan ideologis yang sangat kuat sambil mengklaim tidak melakukan apa pun."},
hukum:{t:"Hukum Pragmatisme sebagai Konservasi",b:"Menerima dunia \"apa adanya\" selalu berarti menerima distribusi kekuasaan saat ini sebagai natural. Padahal setiap \"kenyataan\" sosial yang ada hari ini adalah produk dari pilihan-pilihan masa lalu yang bisa saja berbeda. \"Realistis\" bukan tentang menerima kenyataan — ia tentang menerima kenyataan yang menguntungkan posisi Anda saat ini."},
interogasi:["Apakah \"pragmatisme\" Anda berlaku secara konsisten — atau Anda juga punya hal-hal yang tidak Anda kompromikan meski \"itulah cara dunia bekerja\"?","Jika posisi Anda dalam hierarki sosial berbeda 180 derajat dari yang sekarang, apakah pandangan Anda tentang cara dunia bekerja akan sama?","Kepentingan siapa yang paling diuntungkan oleh keyakinan Anda bahwa tidak ada yang perlu diubah secara fundamental?"],
uji:{t:"Kemenangan dengan Harga Berapa?",s:"Divisi SDM mempresentasikan data: program kesejahteraan karyawan komprehensif akan meningkatkan produktivitas 25% dan menurunkan turnover 40% — tapi membutuhkan kenaikan gaji 30% untuk semua level bawah dan berpotensi memperkuat posisi tawar karyawan serta tekanan untuk serikat buruh.",a:"Ambil langkah pragmatis yang menguntungkan — dan terima bahwa Anda baru saja memberdayakan kelompok yang \"pragmatisme\" Anda selama ini anggap sebagai ancaman.",b:"Pilih yang kurang efisien demi mempertahankan kontrol — dan buktikan bahwa \"pragmatisme\" Anda sebenarnya lebih tentang kekuasaan daripada efisiensi."},pmn:"PMN memiliki sedikit yang bisa ditawarkan di sini — bukan karena tidak mau, tapi karena dialog membutuhkan minimal satu premis bersama. PMN berharap bahwa suatu hari Anda akan menemukan sesuatu yang benar-benar tidak bisa Anda kompromikan — nilai, orang, atau kondisi yang tidak bisa Anda terima 'apa adanya'. Itu bisa menjadi titik masuk."},

LHHH:{n:"Si Aktivis yang Terjebak di Wacana",tag:"Analisis tajam — tapi teori perubahan yang bergantung pada kesadaran",c:"#059669",
jati:"Anda struktural, progresif, dan empiris. Anda memahami ketidakadilan secara sistemik dan menggunakan data untuk mendukung argumen. Tapi dalam teori perubahan Anda, langkah paling krusial adalah mengubah kesadaran, narasi, atau nilai-nilai orang.",
ironi:{t:"Kesadaran yang Tidak Mengancam Siapa Pun",b:"Setiap kampanye kesadaran menghadapi pertanyaan yang sama: awareness untuk siapa dan untuk apa? Meningkatkan kesadaran tanpa meningkatkan kekuasaan dari mereka yang tidak punya kekuasaan hanya menghasilkan lebih banyak orang yang mengerti kenapa mereka tidak berdaya — tapi tetap tidak berdaya. Sistem kekuasaan lebih takut pada satu serikat yang terorganisir daripada pada sepuluh juta orang yang \"tersadar\" tapi tidak terorganisir."},
hukum:{t:"Hukum Awareness sebagai Katup Pengaman",b:"Industri kesadaran — seminar, buku, film dokumenter, podcast, konferensi — adalah salah satu mekanisme cooptation paling efektif yang pernah diciptakan masyarakat liberal. Ia mengubah energi politik menjadi konsumsi kultural. Ia membuat orang merasa sudah \"melakukan sesuatu\" dengan cara yang sama sekali tidak mengancam distribusi kekuasaan yang ada."},
interogasi:["Teori perubahan Anda mengasumsikan kesadaran yang meningkat akan berubah menjadi tindakan kolektif yang mengancam kepentingan yang ada — di mana bukti empirisnya?","Berapa banyak orang yang perlu \"tersadar\" untuk mengimbangi satu pemilik modal yang mengontrol regulasi, media, dan kebijakan?","Jika kesadaran tidak cukup — apa teori perubahan Anda untuk melampaui wacana?"],
uji:{t:"Narasi atau Organisasi?",s:"Konten Anda tentang ketidakadilan upah menjangkau 10 juta orang dan mengubah opini publik secara signifikan. Tapi tidak ada kebijakan yang berubah dalam 3 tahun terakhir. Seorang organizer buruh menawarkan: \"Tinggalkan konten Anda selama 2 tahun dan bantu kami membangun infrastruktur serikat di 5 kota. Jangkauan Anda nol, tapi dampak strukturalnya konkret.\"",a:"Terima — tinggalkan platform yang Anda bangun bertahun-tahun, demi kerja organisasi yang tidak terlihat dan tidak akan pernah tercantum dalam nama Anda.",b:"Tolak — pertahankan platform Anda dan terima bahwa Anda memilih visibilitas atas dampak struktural yang mungkin lebih penting."},pmn:"PMN adalah versi yang lebih materialis dari Anda. Yang PMN tambahkan: jika ide dan kesadaran bisa berubah, pertanyaannya adalah apa yang mengubahnya secara material — kondisi kehidupan, posisi kelas, akses pada sumber daya. Tanpa menjawab ini, teori perubahan Anda bergantung pada sesuatu yang tidak bisa dikendalikan: kapan kesadaran itu akhirnya datang, dan apakah ia datang cukup cepat."},

LHHL:{n:"Si Nabi yang Membangun Komune",tag:"Visi yang menggerakkan — fondasi yang tidak bisa diverifikasi",c:"#d97706",
jati:"Anda struktural dan progresif, dengan semangat yang sering menggerakkan orang lebih dari argumen yang paling logis sekalipun. Tapi fondasi dari semua itu — entah spiritual, moral universal, atau intuisi mendalam — tidak bisa diuji secara empiris.",
ironi:{t:"Mobilisator Terbaik, Strategi Terburuk",b:"Gerakan yang digerakkan oleh keyakinan moral yang kuat bisa menggerakkan massa yang tidak akan bergerak karena analisis dingin. Ini sangat berharga. Tapi gerakan yang tidak bisa merumuskan kemenangan konkret dalam bahasa kepentingan material sering berakhir dengan satu dari dua cara: diserap oleh sistem yang lebih besar, atau runtuh ketika karisma pemimpinnya pergi."},
hukum:{t:"Hukum Komune yang Selalu Pecah",b:"Hampir setiap komunitas utopis yang dibangun di atas fondasi moral atau spiritual murni — tanpa mekanisme pengambilan keputusan material yang jelas — mengalami fragmentasi yang menyakitkan. Bukan karena orangnya jahat, tapi karena konflik kepentingan material tidak hilang hanya karena semua orang sepakat tentang nilai-nilai."},
interogasi:["Ketika ada konflik serius dalam gerakan Anda, apakah Anda menyelesaikannya dengan mekanisme material yang jelas — atau mengandalkan konsensus nilai yang sering tidak tercapai?","Apa yang terjadi pada gerakan Anda jika sumber legitimasi non-materialnya — pemimpin karismatik, keyakinan spiritual — pergi atau terbukti keliru?","Apakah gerakan Anda bisa mengidentifikasi kemenangan konkret yang bisa diverifikasi — atau definisi kemenangan selalu bergerak?"],
uji:{t:"Ketika Komune Menghadapi Realitas Material",s:"Komunitas alternatif yang Anda bangun selama 5 tahun menghadapi krisis: salah satu anggota pendiri mewarisi tanah yang sebelumnya dipakai bersama. Secara hukum tanah itu miliknya. Nilai-nilai komunitas mengatakan tanah itu milik bersama. Ia menolak melepaskan haknya. Anda tidak punya mekanisme kepemilikan material yang jelas dari awal.",a:"Hadapi dengan negosiasi nilai — dan terima risiko bahwa tanpa mekanisme formal, \"konsensus\" berarti siapa yang paling gigih yang menang.",b:"Pergi ke pengacara dan buat mekanisme hukum formal sekarang — dan akui bahwa komunitas utopis Anda membutuhkan instrumen kapitalisme untuk bertahan dari kapitalisme."},pmn:"PMN menghargai energi mobilisasi Anda — tapi menantang fondasi. Satu pertanyaan yang PMN ajukan: jika perjuangan Anda untuk redistribusi berhasil dan kondisi material kehidupan berubah secara fundamental, apakah dimensi spiritual yang Anda pegang juga akan berubah? Jika ya, itu menunjukkan bahwa kondisi material mendahului — dan bahwa spiritualitas Anda adalah ekspresi dari kondisi itu, bukan penyebabnya."},

LHLH:{n:"Si Manajer NGO yang Terjebak",tag:"Niat yang baik — instrumen yang tidak mengancam sistem",c:"#0d9488",
jati:"Anda progresif dan empiris, bekerja keras untuk perubahan yang terukur melalui jalur yang ada. Anda percaya pada data, good governance, dan institusi demokratis yang diperbaiki secara incremental.",
ironi:{t:"Profesionalisasi sebagai Cooptation",b:"Gerakan sosial yang bertransformasi menjadi NGO profesional mengalami \"NGO-ization\" — transformasi dari agen perubahan menjadi penyedia layanan dalam ekosistem yang sudah ada. Bukan karena orangnya berubah, tapi karena struktur pendanaan, akuntabilitas, dan definisi sukses berubah. Anda sekarang bertanggung jawab kepada donor, bukan komunitas."},
hukum:{t:"Hukum Akuntabilitas Terbalik",b:"Semakin profesional sebuah organisasi perubahan sosial, semakin akuntabilitasnya bergeser dari komunitas yang dilayani ke donor yang mendanai. Dan donor — bahkan yang paling progresif — cenderung mendanai perubahan yang tidak terlalu mengancam kepentingan mereka sendiri."},
interogasi:["Kepada siapa Anda sebenarnya bertanggung jawab: komunitas yang Anda layani, atau donor yang mendanai?","Program Anda yang paling berhasil — apakah itu mengubah distribusi kekuasaan, atau memberikan layanan yang lebih baik di dalam distribusi kekuasaan yang sama?","Adakah program yang ingin Anda jalankan tapi tidak bisa karena tidak ada yang mau mendanainya — dan mengapa tidak ada yang mau mendanainya?"],
uji:{t:"Grant atau Gerakan?",s:"Anda mendapat tawaran grant terbesar dalam sejarah organisasi Anda — cukup untuk membayar 50 staf selama 5 tahun. Syaratnya: tidak boleh terlibat dalam advokasi kebijakan atau kampanye publik. Hanya layanan langsung.",a:"Terima — dan berdamai dengan kenyataan bahwa Anda baru saja mengkonversi organisasi perubahan sosial menjadi penyedia layanan yang lebih efisien.",b:"Tolak — dan hadapi kemungkinan bahwa tanpa dana itu, Anda hanya bisa membantu sebagian kecil dari yang membutuhkan."},pmn:"PMN berkata: Anda hampir sampai. Yang hilang adalah analisis tentang mengapa reformasi berbasis bukti sering tersangkut di tengah jalan — yaitu pertanyaan tentang siapa yang memiliki ruang di mana reformasi itu diimplementasikan. Tanpa itu, empirisme Anda akan terus menghasilkan rekomendasi yang bagus di atas kertas tapi lemah di lapangan, dan Anda akan terus bertanya-tanya mengapa data yang benar tidak menghasilkan kebijakan yang benar."},

LHLL:{n:"Si Penjaga Api Lama",tag:"Komunitas yang kuat — untuk tatanan yang sudah ada",c:"#a16207",
jati:"Anda memahami kekuatan institusi dan struktur komunitas dengan baik. Tapi pemahaman struktural Anda digunakan terutama untuk mempertahankan tatanan yang sudah ada — memastikan roda terus berputar, tanpa mempertanyakan ke mana roda itu pergi.",
ironi:{t:"Tradisi yang Melindungi Bukan Hanya Nilai",b:"Tradisi dan komunitas tidak pernah netral — mereka selalu mencerminkan distribusi kekuasaan pada saat tradisi itu dibentuk. Ketika Anda mempertahankan \"nilai tradisional\", pertanyaan yang perlu diajukan adalah: tradisi siapa, dan siapa yang tidak termasuk dalam \"komunitas\" yang Anda jaga? Setiap tradisi yang terasa \"alami\" telah memenangkan pertarungan kekuasaan di masa lalu — dan Anda adalah alat reproduksinya."},
hukum:{t:"Hukum Tradisi sebagai Arsip Kekuasaan",b:"Setiap tradisi yang bertahan cukup lama untuk dianggap alami telah berhasil karena pihak yang paling diuntungkan olehnya berhasil mereproduksinya. Mempertahankan tradisi tanpa menguji premis ini berarti meneruskan kemenangan dari pertarungan yang sudah berlalu tanpa memeriksa apakah kemenangan itu layak diteruskan."},
interogasi:["Tradisi mana yang Anda pertahankan yang paling merugikan anggota paling lemah dari komunitas yang Anda jaga?","Apakah ada perbedaan antara \"nilai komunitas yang Anda percaya\" dan \"nilai komunitas yang menguntungkan posisi Anda di dalamnya\"?","Jika seseorang dari dalam komunitas Anda menantang tatanan yang Anda jaga — apakah Anda melihatnya sebagai ancaman atau sebagai ekspresi nilai yang sama yang Anda klaim?"],
uji:{t:"Tradisi atau Keadilan?",s:"Komunitas yang Anda pimpin memiliki aturan adat yang secara efektif mengecualikan perempuan dari kepemilikan tanah. Sebuah LSM menawarkan program pemberdayaan hukum yang memungkinkan perempuan memiliki tanah secara sah — bertentangan langsung dengan struktur adat yang selama ini Anda jaga.",a:"Tolak — pertahankan kohesi komunitas tapi melanggengkan eksklusi yang mungkin sudah Anda tahu tidak bisa dipertanggungjawabkan secara moral.",b:"Terima — buka kemungkinan perubahan tapi berisiko serangan dari sesama penjaga adat dan fragmentasi komunitas yang Anda bangun seumur hidup."},pmn:"PMN tidak menolak nilai komunitas — tapi menuntut pertanyaan: komunitas siapa, dibangun di atas kondisi material apa, dan siapa yang dieksklusi dari definisi 'komunitas' itu? Tradisi sebagai alat analisis hanya berguna jika bisa mempertanyakan dirinya sendiri. PMN menawarkan cara untuk menjaga apa yang berharga dari komunitas sambil membongkar apa yang hanya berfungsi mereproduksi eksklusi."},

LLHH:{n:"Si Pembela Hak yang Lupa Kelas",tag:"Kebebasan untuk siapa? Hak individual yang melayang bebas dari kondisi material",c:"#3b82f6",
jati:"Anda progresif dan empiris, memperjuangkan hak-hak individual, kebebasan sipil, dan kebijakan berbasis bukti. Anda adalah orang pertama yang berdiri melawan diskriminasi dan sensor. Masalahnya bukan niat Anda — masalahnya adalah unit analisis Anda.",
ironi:{t:"Hak yang Hanya Bisa Dinikmati oleh yang Sudah Punya Cukup",b:"Kebebasan berpendapat sangat berharga — tapi lebih berharga bagi yang punya platform. Hak atas pengacara sangat penting — tapi hanya berarti sesuatu bagi yang bisa membayarnya. Liberalisme individual tanpa analisis material kelas menghasilkan hak-hak yang secara formal setara tapi secara material sangat asimetris dalam penggunaannya."},
hukum:{t:"Hukum Kebebasan Formal yang Kosong",b:"Setiap sistem yang hanya menjamin kebebasan formal tanpa kondisi material yang memungkinkan kebebasan itu digunakan secara setara akan menghasilkan masyarakat di mana hak menjadi sumber daya yang terdistribusi sesuai kelas — bukan sesuai kemanusiaan."},
interogasi:["Hak-hak mana yang paling Anda perjuangkan yang paling tidak dapat diakses oleh mereka yang tidak punya sumber daya material?","Apakah kerangka hak-hak Anda punya mekanisme untuk mengatasi situasi di mana kebebasan satu pihak secara sistemik mengurangi kebebasan pihak lain?","Apa yang terjadi pada agenda kebebasan Anda jika Anda memasukkan kondisi kelas sebagai variabel yang tidak bisa diabaikan?"],
uji:{t:"Kebebasan vs. Kesetaraan Nyata",s:"Sebuah platform media sosial ingin menerapkan kebijakan baru: memblokir semua konten berbayar dari entitas dengan kekayaan lebih dari 100 juta dolar — untuk mengurangi asimetri kekuasaan dalam diskursus publik. Secara formal ini melanggar kebebasan berbicara semua pihak secara setara. Secara material ini mengurangi keuntungan bagi yang sudah punya lebih.",a:"Tolak kebijakan — pertahankan prinsip kebebasan berbicara formal yang selama ini Anda perjuangkan, tapi terima bahwa Anda membela hak yang secara asimetris melayani yang kuat.",b:"Dukung kebijakan — akui bahwa kebebasan yang setara secara formal bisa sangat tidak setara secara material, dan revisi prinsip Anda sesuai konsekuensi itu."},pmn:"PMN dan Anda berbagi banyak hal: komitmen pada bukti, penolakan diskriminasi, kepercayaan pada hak-hak individual. Yang berbeda: PMN berargumen bahwa individu tidak bisa dipahami di luar kondisi material yang membentuknya — dan bahwa kebebasan individual tanpa distribusi material yang memungkinkannya adalah kebebasan di atas kertas. Menambahkan analisis kelas ke toolkit Anda tidak membatalkan komitmen Anda pada hak — ia membuatnya lebih dapat diwujudkan."},

LLHL:{n:"Si Penolong Langsung",tag:"Kasih yang nyata — dan mungkin katup pengaman yang paling efektif",c:"#c43b3b",
jati:"Anda adalah tipe orang yang tidak tahan melihat penderitaan di depan mata. Sementara orang lain berdebat tentang teori dan ideologi, Anda sudah turun ke jalan, memberi makan, mengobati, atau menyekolahkan. Bagi Anda, bantuan nyata — sekalipun kecil — jauh lebih berharga daripada manifesto setebal 100 halaman. Kompas moral Anda bekerja.",
ironi:{t:"Anda Mungkin Adalah Peredam Revolusi Paling Efektif",b:"Bayangkan mesin besar yang setiap hari memproduksi korban luka. Anda berdiri di ujungnya, merawat setiap korban dengan sangat terampil dan penuh kasih. Tapi selama Anda di sana, tidak ada yang merasa perlu mematikan mesinnya — karena lukanya sudah dirawat, teriakannya sudah diredam. Anda adalah shock absorber paling efektif yang bisa \"dibeli\" oleh sistem itu — dan Anda melakukannya secara gratis. Tanpa Anda, mesin itu mungkin sudah lama dihancurkan oleh massa yang marah."},
hukum:{t:"Hukum Katup Pengaman",b:"Dalam setiap masyarakat yang timpang, para dermawan dan relawan muncul bukan kebetulan — mereka adalah katup pengaman sosial yang mencegah tekanan meledak. Masalahnya bukan niat Anda. Masalahnya adalah bahwa sistem itu sendiri bergantung pada keberadaan Anda. Setiap kali Anda membangun dapur umum, Anda menurunkan peluang terjadinya protes massal."},
interogasi:["Jika besok semua program Anda lenyap, apakah komunitas yang Anda bantu akan bangkit dan menuntut hak mereka — atau langsung runtuh karena terlalu bergantung pada Anda?","Pernahkah Anda merasa risih ketika seseorang mulai \"terlalu politis\" tentang masalah yang selama ini Anda tangani dengan amal? Apakah karena politik tidak penting — atau karena politik mengancam pekerjaan baik yang Anda lakukan?","Siapa yang paling senang dengan keberadaan Anda: penerima bantuan, atau para pemilik kekuasaan yang tidak perlu lagi takut pada penerima bantuan Anda?"],
uji:{t:"Dapur Umum atau Senjata Logistik?",s:"Anda mengelola dapur umum yang setiap hari memberi makan 500 keluarga. Seorang aktivis datang malam ini: \"Besok kami memblokade pabrik-pabrik untuk menuntut kenaikan upah. Kami butuh dapur umum keliling Anda untuk memberi makan para pemogok. Jika Anda setuju, dapur Anda mungkin disegel penguasa selama berminggu-minggu. Tapi jika mogok berhasil, mereka tidak akan butuh dapur umum Anda lagi.\"",a:"Menolak — demi menjaga 500 keluarga tetap makan besok. Dan memastikan bahwa mereka akan terus bergantung pada dapur umum Anda tahun depan, dan tahun depannya lagi.",b:"Menerima — demi peluang yang bisa menghapus kebutuhan itu selamanya. Dengan risiko bahwa jika mogok gagal, Anda telah mengorbankan 500 keluarga tanpa hasil apa pun."},pmn:"PMN tidak menolak empati sebagai motivator — ini yang membedakannya dari analisis dingin yang kehilangan kontak dengan penderitaan nyata. Tapi PMN berargumen bahwa empati tanpa analisis struktural sering menghasilkan intervensi yang meredam tekanan tanpa mengubah mesin. PMN menawarkan cara untuk mengubah kasih yang Anda miliki menjadi tindakan yang menyentuh akar, bukan hanya merawat akibatnya — dan mungkin, untuk membedakan antara tindakan yang membantu dan tindakan yang tanpa sadar melanggengkan."},

LLLH:{n:"Si Skeptis Elitis",tag:"Empiris tanpa keberpihakan — alat paling netral di tangan yang paling tidak netral",c:"#475569",
jati:"Anda menghargai logika, data, dan konsistensi argumentasi dengan standar tinggi. Anda skeptis terhadap klaim yang berlebihan — termasuk dari gerakan progresif. Tapi komitmen pada empirisme tidak disertai kesadaran tentang kekuasaan, redistribusi, atau pentingnya keberpihakan.",
ironi:{t:"Kehormatan Intelektual yang Melayani yang Berkuasa",b:"Skeptisisme yang diterapkan secara setara kepada semua klaim — termasuk klaim dari yang tertindas — secara efektif lebih memberatkan yang lemah daripada yang kuat. Yang berkuasa punya sumber daya untuk memproduksi bukti yang memenuhi standar Anda. Yang lemah sering tidak. Ketika Anda menerapkan standar epistemik yang sama tanpa mempertimbangkan asimetri ini, Anda bukan bersikap objektif — Anda bersikap tidak adil dengan cara yang terlihat sangat rasional."},
hukum:{t:"Hukum Standar Bukti yang Asimetris",b:"Semakin tinggi standar bukti yang Anda terapkan, semakin besar keuntungan bagi pihak yang punya sumber daya untuk memenuhinya. Ilmu pengetahuan tanpa kesadaran tentang siapa yang mendanai pertanyaan yang diteliti adalah instrumen yang sangat kuat di tangan yang paling tidak membutuhkan pertolongan."},
interogasi:["Apakah Anda menerapkan skeptisisme yang sama ketatnya pada klaim dari kelompok yang berkuasa seperti pada klaim dari yang tidak berdaya?","Seberapa sering \"saya perlu lebih banyak bukti\" Anda diucapkan pada klaim yang menguntungkan yang sudah punya kekuasaan?","Apakah ada posisi normatif Anda yang tidak terbuka untuk revisi berdasarkan bukti — dan jika ada, apa artinya itu untuk konsistensi epistemik Anda?"],
uji:{t:"Standar untuk Siapa?",s:"Seorang aktivis mempresentasikan dokumentasi pelanggaran HAM oleh perusahaan tambang — saksi, video, catatan medis. Anda menemukan beberapa inkonsistensi kecil. Perusahaan membantah dengan laporan dari konsultan mahal yang metodologinya secara teknis lebih ketat. Standar bukti Anda, jika diterapkan konsisten, meminta Anda menunda kesimpulan.",a:"Tunda kesimpulan dan minta standar metodologi yang lebih ketat — dan terima bahwa waktu yang dihabiskan menguntungkan perusahaan.",b:"Ambil kesimpulan meski metodologinya tidak sempurna — dan akui bahwa kadang standar epistemik yang konsisten secara formal menghasilkan ketidakadilan secara material."},pmn:"PMN menghargai standar epistemik Anda. Yang hilang: refleksi tentang kondisi sosial dari produksi pengetahuan itu sendiri. Pertanyaan bukan hanya 'apakah klaim ini valid?' tapi 'siapa yang mendanai pertanyaan ini, mengapa pertanyaan ini yang ditanyakan, dan apa yang tidak pernah ditanyakan?' Skeptisisme yang benar-benar konsisten harus memasukkan skeptisisme pada dirinya sendiri — dan pada institusi yang menghasilkan standar yang Anda pakai."},

LLLL:{n:"Si Penjaga Tradisi",tag:"Dunia yang koheren — dibangun di atas asumsi yang belum pernah diuji",c:"#b45309",
jati:"Worldview Anda koheren dan memberikan makna yang dalam. Anda memprioritaskan keyakinan spiritual, tradisi, dan nilai-nilai komunitas yang sudah teruji waktu. Masalahnya bukan pada keyakinan itu sendiri — masalahnya adalah asumsi tentang dari mana keyakinan itu berasal dan untuk siapa ia bekerja.",
ironi:{t:"Tradisi Milik Siapa?",b:"Setiap tradisi yang terasa \"alami\" dan \"sudah selalu begitu\" telah berhasil melewati seleksi kekuasaan — ia tetap ada karena pihak yang paling diuntungkan olehnya berhasil mereproduksinya. Ini bukan berarti tradisi itu salah. Tapi ini berarti \"alami\" dan \"sudah selalu begitu\" bukan argumen — itu adalah deskripsi dari kemenangan seseorang di masa lalu yang mungkin tidak bisa Anda pertanggungjawabkan secara independen."},
hukum:{t:"Hukum Tradisi yang Tidak Memeriksa Dirinya",b:"Sistem nilai yang tidak memiliki mekanisme untuk menguji apakah ia masih valid — yang mendefinisikan ketidaksetujuan sebagai dosa atau pengkhianatan — adalah sistem yang tidak bisa salah bukan karena ia benar, tapi karena ia sudah memblokir semua jalur verifikasi. Ketahanan bukan bukti kebenaran."},
interogasi:["Apa yang akan mengubah pikiran Anda tentang keyakinan yang paling sentral dalam worldview Anda — dan jika tidak ada yang bisa mengubahnya, apa artinya itu?","Siapa yang paling dirugikan oleh tradisi yang Anda pertahankan — dan apakah mereka punya suara dalam komunitas Anda?","Jika Anda dilahirkan dalam komunitas yang berbeda dengan tradisi berlawanan, apakah Anda akan sama yakinnya bahwa tradisi itu benar secara alami?"],
uji:{t:"Wahyu atau Bukti?",s:"Seorang anggota keluarga yang Anda sayangi didiagnosis menderita penyakit yang bisa disembuhkan secara medis dengan tingkat keberhasilan 95% — tapi pengobatannya bertentangan dengan praktik keagamaan yang Anda yakini. Pemimpin agama Anda berkata menerima pengobatan adalah kurangnya iman. Data medis berkata menolaknya kemungkinan besar fatal.",a:"Ikuti keyakinan — dan terima segala konsekuensi yang mungkin terjadi, termasuk yang paling tidak bisa Anda bayangkan sebelumnya.",b:"Terima pengobatan — dan hadapi kenyataan bahwa ketika benar-benar diuji, hierarki keyakinan Anda mungkin berbeda dari yang selama ini Anda akui secara publik."},pmn:"PMN tidak meminta Anda meninggalkan keyakinan Anda. Tapi menawarkan satu pertanyaan yang tidak bisa diabaikan: jika sistem nilai Anda memang berasal dari kebenaran yang melampaui kondisi material, mengapa secara historis sistem nilai serupa sangat konsisten dalam melayani kepentingan mereka yang sudah berkuasa? Ini bukan serangan terhadap iman — ini adalah pertanyaan tentang fungsi sosial dari iman tersebut. Menjawabnya dengan jujur, alih-alih menghindarinya, adalah yang PMN tawarkan."},
};

const AX_META={M:{l:"Materialisme",lo:"Idealis",hi:"Materialis"},S:{l:"Analisis Struktural",lo:"Individualis",hi:"Strukturalis"},P:{l:"Keberpihakan",lo:"Konservatif",hi:"Progresif"},E:{l:"Epistemologi",lo:"Non-empiris",hi:"Empiris"}};

const SHADOW={
  M:{hi:"Fondasi materialist sebagai bayangan: Anda lebih kritis dari rata-rata terhadap narasi yang mengabaikan kondisi material — ini aset yang perlu dikembangkan lebih jauh.",lo:"Absennya fondasi material berarti analisis Anda rentan pada solusi yang mengubah narasi tapi tidak menyentuh mekanisme."},
  S:{hi:"Kemampuan membaca struktur sebagai bayangan: Anda tidak mudah puas dengan penjelasan individual — ini yang membedakan analisis dari moralisasi.",lo:"Tanpa orientasi struktural yang kuat, Anda cenderung mencari solusi pada level orang, bukan sistem."},
  P:{hi:"Keberpihakan sebagai bayangan: Ada arah normatif dalam analisis Anda yang memberi orientasi — pastikan ia memperkuat, bukan menggantikan, analisis materialnya.",lo:"Tanpa keberpihakan yang jelas, kerangka analitis yang tajam pun bisa menjadi alat legitimasi status quo."},
  E:{hi:"Komitmen epistemik sebagai bayangan: Anda tidak mudah menerima klaim tanpa dasar — ini mencegah analisis dari menjadi ideologi yang tidak bisa diuji.",lo:"Fondasi epistemik yang lemah membuat argumen Anda, meski tajam secara moral, rentan terhadap serangan metodologis."},
};

const MAX=33;
const LETTERS=["A","B","C","D"];

function shuffle(arr,seed){const a=[...arr];let s=seed;for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)&0xffffffff;const j=Math.abs(s)%(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}

function App(){
  const[phase,setPhase]=useState("intro");
  const[cur,setCur]=useState(0);
  const[ans,setAns]=useState({});
  const[open,setOpen]=useState({});
  const topRef=useRef();

  const scores=useMemo(()=>{
    const s={M:0,S:0,P:0,E:0};
    Object.entries(ans).forEach(([id,sc])=>{const q=Q.find(x=>x.id===parseInt(id));if(q)s[q.ax]+=sc;});
    return s;
  },[ans]);

  const profile=useMemo(()=>{
    const key=["M","S","P","E"].map(ax=>scores[ax]>16?"H":"L").join("");
    return PROFILES[key];
  },[scores]);

  const shadowInfo=useMemo(()=>{
    const ranked=["M","S","P","E"].map(ax=>({ax,pct:scores[ax]/MAX})).sort((a,b)=>b.pct-a.pct);
    const second=ranked[1];
    const isHi=second.pct>0.5;
    return{ax:second.ax,label:AX_META[second.ax].l,pct:Math.round(second.pct*100),note:SHADOW[second.ax][isHi?"hi":"lo"]};
  },[scores]);

  const q=Q[cur];
  const opts=useMemo(()=>shuffle(q.opts,q.id*31337),[q.id]);
  const pct=Math.round((cur/Q.length)*100);

  useEffect(()=>{topRef.current?.scrollIntoView({behavior:"smooth"});},[cur,phase]);

  function pick(s){
    const next={...ans,[q.id]:s};
    setAns(next);
    if(cur<Q.length-1)setCur(c=>c+1);
    else setPhase("results");
  }
  function back(){if(cur>0)setCur(c=>c-1);else setPhase("intro");}
  function restart(){setAns({});setCur(0);setPhase("intro");setOpen({});}
  function tog(k){setOpen(o=>({...o,[k]:!o[k]}));}

  const S={
    wrap:{maxWidth:680,margin:"0 auto",padding:"2rem 1.25rem"},
    label:{fontFamily:"'IBM Plex Mono',monospace",fontSize:"11px",letterSpacing:".08em",textTransform:"uppercase",color:"#9b9890"},
    border:{borderTop:"1px solid #d4d0c6"},
  };

  if(phase==="intro") return(
    <div ref={topRef} style={S.wrap}>
      <div style={{marginBottom:"3rem"}}>
        <p style={{...S.label,marginBottom:"1rem"}}>Progressive Materialist Naturalism</p>
        <h1 style={{fontSize:"clamp(28px,5vw,42px)",fontWeight:600,lineHeight:1.2,marginBottom:"1.5rem",color:"#1c1c1a"}}>Di mana kamu<br/>berdiri?</h1>
        <p style={{color:"#6b6960",lineHeight:1.8,marginBottom:"1rem",fontSize:"17px"}}>PMN adalah kerangka filosofis dan politik yang menganalisis realitas sosial melalui kondisi material, struktur kekuasaan, dan metodologi empiris.</p>
        <p style={{color:"#6b6960",lineHeight:1.8,marginBottom:"1rem",fontSize:"17px"}}>Kuis ini bukan tes pengetahuan. Tidak ada jawaban benar atau salah. Hasil akhirnya bukan label — tapi narasi yang menantang, termasuk kemungkinan bahwa worldview Anda secara tidak sengaja melayani hal yang tidak Anda maksudkan.</p>
        <p style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"12px",color:"#9b9890",marginBottom:"2.5rem"}}>44 pertanyaan · ~15–20 menit · 16 profil</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.75rem",marginBottom:"2.5rem"}}>
        {Object.entries(AX_META).map(([k,v])=>(
          <div key={k} style={{background:"#efede8",borderRadius:"6px",padding:"14px 16px"}}>
            <p style={{...S.label,marginBottom:"4px"}}>{v.l}</p>
            <p style={{fontSize:"14px",color:"#6b6960"}}>{v.lo} → {v.hi}</p>
          </div>
        ))}
      </div>
      <button onClick={()=>setPhase("quiz")} style={{background:"#1c1c1a",color:"#f7f6f2",border:"none",padding:"14px 32px",fontSize:"16px",borderRadius:"4px",cursor:"pointer",fontFamily:"'Crimson Pro',serif",letterSpacing:".01em"}}>
        Mulai →
      </button>
    </div>
  );

  if(phase==="quiz") return(
    <div ref={topRef} style={S.wrap}>
      <div style={{position:"sticky",top:0,background:"#f7f6f2",paddingBottom:"1.25rem",zIndex:10}}>
        <div style={{height:"2px",background:"#e6e3db",borderRadius:"2px",marginBottom:"0.75rem"}}>
          <div style={{height:"2px",width:pct+"%",background:"#1e5055",borderRadius:"2px",transition:"width .3s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          <span style={{...S.label}}>{AX_META[q.ax]?.l || ""}{q.id>36?" · Situasi":""}</span>
          <span style={{...S.label}}>{cur+1} / {Q.length}</span>
        </div>
      </div>

      <p style={{fontSize:"clamp(17px,2.5vw,21px)",fontWeight:500,lineHeight:1.6,marginBottom:"2rem",color:"#1c1c1a"}}>{q.q}</p>

      <div style={{display:"flex",flexDirection:"column",gap:"0.625rem",marginBottom:"2rem"}}>
        {opts.map((opt,i)=>{
          const chosen=ans[q.id]===opt.s;
          return(
            <button key={i} onClick={()=>pick(opt.s)} style={{display:"flex",alignItems:"flex-start",gap:"12px",padding:"14px 16px",textAlign:"left",borderRadius:"6px",border:chosen?"1.5px solid #1c1c1a":"1px solid #d4d0c6",background:chosen?"#1c1c1a":"#faf9f5",color:chosen?"#f7f6f2":"#1c1c1a",cursor:"pointer",transition:"all .15s"}}>
              <span style={{flexShrink:0,fontFamily:"'IBM Plex Mono',monospace",fontSize:"11px",letterSpacing:".05em",color:chosen?"rgba(247,246,242,.5)":"#9b9890",marginTop:"3px",minWidth:"18px"}}>{LETTERS[i]}</span>
              <span style={{fontSize:"15px",lineHeight:1.7}}>{opt.t}</span>
            </button>
          );
        })}
      </div>

      <button onClick={back} style={{background:"none",border:"none",color:"#9b9890",cursor:"pointer",fontFamily:"'Crimson Pro',serif",fontSize:"15px",padding:0}}>← Kembali</button>
    </div>
  );

  // Results
  const Block=({id,label,children})=>(
    <div style={S.border}>
      <button onClick={()=>tog(id)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"1rem 0",background:"none",border:"none",cursor:"pointer",fontFamily:"'IBM Plex Mono',monospace"}}>
        <span style={{fontSize:"11px",letterSpacing:".08em",textTransform:"uppercase",color:open[id]?"#1c1c1a":"#9b9890"}}>{label}</span>
        <span style={{fontSize:"20px",color:"#9b9890",lineHeight:1,transform:open[id]?"rotate(45deg)":"none",transition:"transform .2s"}}>+</span>
      </button>
      {open[id]&&<div style={{paddingBottom:"1.5rem"}}>{children}</div>}
    </div>
  );

  return(
    <div ref={topRef} style={S.wrap}>
      <p style={{...S.label,marginBottom:"1rem"}}>Hasil analisis</p>

      <div style={{marginBottom:"0.5rem",display:"flex",flexWrap:"wrap",gap:"0.5rem",alignItems:"baseline"}}>
        <h1 style={{fontSize:"clamp(22px,4vw,32px)",fontWeight:600,lineHeight:1.2,color:"#1c1c1a",margin:0}}>{profile.n}</h1>
        <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"10px",letterSpacing:".05em",padding:"4px 10px",borderRadius:"2px",background:profile.c+"18",color:profile.c,whiteSpace:"nowrap"}}>{profile.tag}</span>
      </div>

      <p style={{fontSize:"17px",lineHeight:1.8,color:"#3a3a38",marginTop:"1.25rem",marginBottom:"2rem"}}>{profile.jati}</p>

      <div style={{background:"#efede8",borderRadius:"8px",padding:"1.25rem",marginBottom:"2rem"}}>
        {Object.entries(AX_META).map(([ax,meta])=>{
          const p=Math.round((scores[ax]/MAX)*100);
          return(
            <div key={ax} style={{marginBottom:"0.875rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}>
                <span style={{fontSize:"13px",fontWeight:500,color:"#1c1c1a"}}>{meta.l}</span>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"11px",color:"#9b9890"}}>{p}%</span>
              </div>
              <div style={{height:"4px",background:"#d4d0c6",borderRadius:"2px"}}>
                <div style={{height:"4px",width:p+"%",background:profile.c,borderRadius:"2px",transition:"width .6s ease"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:"3px"}}>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"10px",color:"#b4b0a6"}}>{meta.lo}</span>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"10px",color:"#b4b0a6"}}>{meta.hi}</span>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{marginBottom:"2rem"}}>
        <Block id="ironi" label="Ironi Tragis">
          <p style={{fontSize:"16px",fontStyle:"italic",fontWeight:600,color:"#8b3a3a",marginBottom:"0.75rem",lineHeight:1.4}}>"{profile.ironi.t}"</p>
          <p style={{fontSize:"16px",lineHeight:1.85,color:"#3a3a38"}}>{profile.ironi.b}</p>
        </Block>
        <Block id="hukum" label="Hukum Tak Terlihat">
          <p style={{fontSize:"16px",fontWeight:600,color:"#1c1c1a",marginBottom:"0.75rem"}}>{profile.hukum.t}</p>
          <p style={{fontSize:"16px",lineHeight:1.85,color:"#3a3a38"}}>{profile.hukum.b}</p>
        </Block>
        <Block id="interogasi" label="Interogasi Diri">
          <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
            {profile.interogasi.map((item,i)=>(
              <div key={i} style={{display:"flex",gap:"1rem",alignItems:"flex-start"}}>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"11px",color:"#9b9890",flexShrink:0,marginTop:"4px"}}>{i+1}.</span>
                <p style={{fontSize:"16px",lineHeight:1.8,color:"#3a3a38",margin:0}}>{item}</p>
              </div>
            ))}
          </div>
        </Block>
        <Block id="uji" label="Uji Tekanan">
          <div style={{borderLeft:`3px solid ${profile.c}`,paddingLeft:"1.25rem"}}>
            <p style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"11px",letterSpacing:".06em",textTransform:"uppercase",color:profile.c,marginBottom:"0.75rem"}}>{profile.uji.t}</p>
            <p style={{fontSize:"16px",lineHeight:1.85,color:"#3a3a38",marginBottom:"1.5rem"}}>{profile.uji.s}</p>
            <div style={{display:"flex",flexDirection:"column",gap:"0.625rem"}}>
              {[["A",profile.uji.a],["B",profile.uji.b]].map(([l,txt])=>(
                <div key={l} style={{padding:"14px 16px",borderRadius:"6px",border:"1px solid #d4d0c6",background:"#faf9f5"}}>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"10px",color:"#9b9890",letterSpacing:".06em",textTransform:"uppercase"}}>Pilihan {l}</span>
                  <p style={{fontSize:"15px",lineHeight:1.7,color:"#1c1c1a",margin:"6px 0 0"}}>{txt}</p>
                </div>
              ))}
            </div>
          </div>
        </Block>
        <Block id="bayangan" label="Profil Bayangan">
          <div style={{background:"#efede8",borderRadius:"6px",padding:"1.25rem"}}>
            <p style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"11px",color:"#9b9890",letterSpacing:".06em",textTransform:"uppercase",marginBottom:"0.5rem"}}>Dimensi terkuat kedua: {shadowInfo.label} · {shadowInfo.pct}%</p>
            <p style={{fontSize:"16px",lineHeight:1.8,color:"#3a3a38",margin:0}}>{shadowInfo.note}</p>
          </div>
        </Block>
        <Block id="pmn" label="Apa yang PMN Tawarkan">
          <div style={{borderLeft:"3px solid #1e5055",paddingLeft:"1.25rem"}}>
            <p style={{fontSize:"16px",lineHeight:1.9,color:"#3a3a38"}}>{profile.pmn}</p>
          </div>
        </Block>
      </div>

      <div style={{...S.border,paddingTop:"1.5rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={restart} style={{background:"none",border:"1px solid #d4d0c6",color:"#6b6960",padding:"10px 24px",borderRadius:"4px",cursor:"pointer",fontFamily:"'Crimson Pro',serif",fontSize:"15px"}}>Mulai ulang</button>
        <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"10px",color:"#9b9890"}}>PMN Stance Quiz</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
