<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance - PMN Framework</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f1f5f9;
            --accent-color: #38bdf8;
            --secondary-color: #94a3b8;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }
        p {
            font-size: 1.2rem;
            color: var(--secondary-color);
            line-height: 1.6;
        }
        .icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid var(--secondary-color);
            border-top: 5px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🛠️</div>
        <h1>Under Maintenance</h1>
        <p>Progressive Materialist Naturalism (PMN) Framework is currently undergoing scheduled maintenance to improve our UI/UX.</p>
        <div class="loader"></div>
        <p>We'll be back online shortly with a better experience. Thank you for your patience.</p>
        <div class="footer">
            &copy; 2026 PMN Framework. All rights reserved.
        </div>
    </div>
</body>
</html>
